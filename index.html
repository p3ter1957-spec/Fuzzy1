<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student ID</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- App Header -->
  <div class="app-header">
    <span>Student ID</span>
  </div>

  <!-- Main Card -->
  <div class="card-wrapper">
    <div class="card">

      <!-- University Header -->
      <div class="uni-header">
        <div class="uni-name">
          <span class="uni-grand">Grand Canyon</span>
          <span class="uni-sub">University<sup>®</sup></span>
        </div>
      </div>

      <!-- Activity Fee Banner -->
      <div class="activity-fee-wrapper">
        <div class="activity-fee">
          <span class="checkmark">✔</span> Activity Fee
        </div>
      </div>

      <!-- Reload Button -->
      <div class="reload-row">
        <button class="reload-btn" id="reloadBtn" title="Update date & time">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>

      <!-- Profile Photo -->
      <div class="photo-box">
        <img src="Art1.jpg" alt="Student Photo" />
      </div>






      <!-- Name & Role -->
      <div class="name-section">
        <h2 class="student-name">Edward Douglas</h2>
        <span class="role-badge">Student</span>
      </div>

      <!-- Barcode -->
      <div class="barcode-wrapper">
        <canvas id="barcodeCanvas" width="440" height="90"></canvas>
      </div>

      <!-- Sliding Green Bar -->
      <div class="slider-track">
        <div class="slider-bar" id="sliderBar"></div>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        <p class="last-updated-label">Last updated:</p>
        <p class="last-updated-time" id="dateTime"></p>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <circle cx="9" cy="12" r="2.5"/>
        <line x1="14" y1="10" x2="20" y2="10"/>
        <line x1="14" y1="14" x2="18" y2="14"/>
      </svg>
      <span>Student ID</span>
    </div>
    <div class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Logout</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
